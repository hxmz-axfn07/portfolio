name: Compile resume PDF

on:
  push:
    paths:
      - resume.tex
      - .github/workflows/compile-resume.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile resume
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume.tex

      - name: Commit updated PDF
        run: |
          if git diff --quiet -- resume.pdf; then
            echo "resume.pdf already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resume.pdf
          git commit -m "chore: compile resume PDF"
          git push
